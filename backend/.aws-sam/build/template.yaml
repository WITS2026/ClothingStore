AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Clothing Store Website - Lambda + API Gateway + DynamoDB
Globals:
  Function:
    Runtime: nodejs22.x
    Handler: index.handler
    Environment:
      Variables:
        TABLE_NAME:
          Ref: ClothingStoreTable
Resources:
  ClothingStoreApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: ClothingStoreApi
      CorsConfiguration:
        AllowMethods:
        - GET
        - POST
        - DELETE
        - OPTIONS
        AllowHeaders:
        - '*'
        AllowOrigins:
        - http://localhost:5173
  ClothingStoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: clothing-store
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
  GetCart:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetCart
      CodeUri: GetCart
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /getCart/{userId}
            Method: GET
            ApiId:
              Ref: ClothingStoreApi
    Metadata:
      SamResourceId: GetCart
  UpdateUserCart:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UpdateUserCart
      CodeUri: UpdateUserCart
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /updateUserCart/{userId}
            Method: POST
            ApiId:
              Ref: ClothingStoreApi
    Metadata:
      SamResourceId: UpdateUserCart
  DeleteCartItem:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DeleteCartItem
      CodeUri: DeleteCartItem
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /cartItem/{productId}/user/{userId}
            Method: DELETE
            ApiId:
              Ref: ClothingStoreApi
    Metadata:
      SamResourceId: DeleteCartItem
  GetAllProducts:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetAllProducts
      CodeUri: GetAllProducts
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /products
            Method: GET
            ApiId:
              Ref: ClothingStoreApi
    Metadata:
      SamResourceId: GetAllProducts
Outputs:
  ApiUrl:
    Description: HTTP API endpoint base URL
    Value:
      Fn::Sub: https://${ClothingStoreApi}.execute-api.${AWS::Region}.amazonaws.com
  TableName:
    Description: DynamoDB table name
    Value:
      Ref: ClothingStoreTable
