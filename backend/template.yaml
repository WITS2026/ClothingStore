AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Clothing Store Website - Lambda + API Gateway + DynamoDB

Globals:
  Function:
    Runtime: nodejs22.x
    Handler: index.handler
    Environment:
      Variables:
        TABLE_NAME: !Ref ClothingStoreTable

Resources:
  ClothingStoreUserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: clothing-store-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  ClothingStoreUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: clothing-store-web-client
      UserPoolId: !Ref ClothingStoreUserPool
      GenerateSecret: false

  ClothingStoreApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: ClothingStoreApi
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        AllowOrigins:
          - http://localhost:5173
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${ClothingStoreUserPool}"
              audience:
                - !Ref ClothingStoreUserPoolClient

  ClothingStoreTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: clothing-store
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  GetCart:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetCart
      CodeUri: getCart/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /getCart/{userId}
            Method: GET
            ApiId: !Ref ClothingStoreApi
            Auth:
              Authorizer: CognitoAuthorizer

  UpdateUserCart:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UpdateUserCart
      CodeUri: updateUserCart/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /updateUserCart/{userId}
            Method: POST
            ApiId: !Ref ClothingStoreApi
            Auth:
              Authorizer: CognitoAuthorizer

  DeleteCartItem:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DeleteCartItem
      CodeUri: deleteCartItem/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /cartItem/{productId}/user/{userId}
            Method: DELETE
            ApiId: !Ref ClothingStoreApi
            Auth:
              Authorizer: CognitoAuthorizer

  GetAllProducts:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetAllProducts
      CodeUri: getAllProducts/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClothingStoreTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /products
            Method: GET
            ApiId: !Ref ClothingStoreApi

Outputs:
  ApiUrl:
    Description: HTTP API endpoint base URL
    Value: !Sub "https://${ClothingStoreApi}.execute-api.${AWS::Region}.amazonaws.com"

  TableName:
    Description: DynamoDB table name
    Value: !Ref ClothingStoreTable
  
  UserPoolId:
    Value: !Ref ClothingStoreUserPool

  UserPoolClientId:
    Value: !Ref ClothingStoreUserPoolClient

  Region:
    Value: !Ref AWS::Region